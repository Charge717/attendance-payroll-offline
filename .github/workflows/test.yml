name: Tests

on:
  push:
  pull_request:

jobs:
  payroll-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Syntax check
        run: npm run check

      - name: i18n audit
        run: npm run i18n:audit

      - name: Privacy audit
        run: npm run privacy:audit

      - name: Run tests
        run: npm test
