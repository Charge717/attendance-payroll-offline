name: Tests

on:
  push:
  pull_request:

jobs:
  payroll-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Syntax check
        run: npm run check

      - name: Run tests
        run: npm test
